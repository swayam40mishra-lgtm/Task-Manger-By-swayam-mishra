<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D1117" />
  <meta name="description" content="Muskan — a minimal premium personal app by Swayam." />
  <title>Muskan</title>  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="App greeting">
      <p class="app-brand">MUSKAN</p>
      <h1 class="greeting">
        Good Evening,<br />
        Muskan.
      </h1>
    </header><main class="home-grid" aria-label="Muskan modules">
  <section class="module-card" aria-labelledby="muskan-ai-title">
    <div class="module-icon" aria-hidden="true">🤖</div>
    <div class="module-copy">
      <h2 id="muskan-ai-title" class="module-title">MUSKAN AI</h2>
    </div>
    <a class="module-action" href="#" id="open-ai-module" aria-label="Open AI Module">Open AI Module →</a>
  </section>

  <section class="module-card" aria-labelledby="swayam-tracker-title">
    <div class="module-icon" aria-hidden="true">🛰️</div>
    <div class="module-copy">
      <h2 id="swayam-tracker-title" class="module-title">SWAYAM TRACKER</h2>
    </div>
    <a class="module-action" href="#" id="open-tracker-module" aria-label="Open Tracker Module">Open Tracker Module →</a>
  </section>

  <section class="module-card" aria-labelledby="quiet-mode-title">
    <div class="module-icon" aria-hidden="true">🌙</div>
    <div class="module-copy">
      <h2 id="quiet-mode-title" class="module-title">QUIET MODE</h2>
    </div>
    <a class="module-action" href="#" id="open-quiet-mode" aria-label="Open Quiet Mode">Open Quiet Mode →</a>
  </section>

  <section class="module-card module-card-emergency" aria-labelledby="muskan-shield-title">
    <div class="module-icon" aria-hidden="true">🛡️</div>
    <div class="module-copy">
      <h2 id="muskan-shield-title" class="module-title">MUSKAN SHIELD</h2>
    </div>
    <a class="module-action module-action-emergency" href="#" id="open-shield-module" aria-label="Open Shield Module">Open Shield Module →</a>
  </section>
</main>

<footer class="footer" aria-label="App footer">
  <p>Built by Swayam.</p>
</footer>

  </div>
</body>
</html>
