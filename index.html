<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RenuVerse — A Universe Built For One Person</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 🌌 INTRO SCREEN -->
  <section id="introScreen" class="screen active">
    <div class="stars"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="intro-box">
      <p class="intro-line reveal delay-1">The website was only the beginning…</p>
      <p class="intro-line reveal delay-2">Welcome to something deeper.</p>
      <h1 class="brand reveal delay-3">RenuVerse</h1>
      <p class="tagline reveal delay-4">A universe built around one person.</p>

      <button id="enterUniverseBtn" class="main-btn reveal delay-5">Enter the Universe</button>

      <p class="credit intro-credit reveal delay-5">Designed by <span>Swayam</span></p>
    </div>
  </section>

  <!-- ⚡ BOOT SCREEN -->
  <section id="bootScreen" class="screen hidden">
    <div class="boot-wrap">
      <h2 class="boot-title">Initializing RenuVerse...</h2>
      <div class="boot-console" id="bootConsole"></div>
    </div>
  </section>

  <!-- 💬 CHAT SCREEN -->
  <section id="chatScreen" class="screen hidden">
    <div class="chat-bg-stars"></div>

    <div class="chat-shell">
      <header class="chat-header">
        <div class="header-left">
          <div class="orb"></div>
          <div>
            <h1>RenuVerse</h1>
            <p>A chatbot made only for you</p>
          </div>
        </div>

        <div class="header-right">
          <div class="status-pill">
            <span class="status-dot"></span>
            Active
          </div>
        </div>
      </header>

      <div class="unlock-banner hidden" id="unlockBanner">
        ✨ Hidden Chapter Unlocked — Try asking: <strong>One last message</strong>
      </div>

      <div class="chat-body" id="chatBody">
        <!-- messages injected by JS -->
      </div>

      <div class="chips-wrap" id="chipsWrap">
        <button class="chip">How did it all begin?</button>
        <button class="chip">What makes me special?</button>
        <button class="chip">Why did you make this?</button>
        <button class="chip">What do I mean to you?</button>
        <button class="chip">Tell me a hidden memory</button>
        <button class="chip">One last message</button>
      </div>

      <div class="chat-input-bar" id="chatInputBar">
        <input
          type="text"
          id="userInput"
          placeholder="Ask RenuVerse something from the heart..."
          autocomplete="off"
        />
        <button id="sendBtn" class="send-btn">Send</button>
      </div>

      <p class="footer-credit">
        Designed by <span>Swayam</span>
      </p>
    </div>
  </section>

  <!-- 🌠 FINAL OVERLAY -->
  <div id="finalOverlay" class="final-overlay hidden">
    <div class="final-content">
      <div id="finalLines" class="final-lines"></div>
      <button id="returnToChatBtn" class="main-btn final-btn hidden">Return to RenuVerse</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
