<!DOCTYPE html>

<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muskan Admin Panel</title><link rel="stylesheet" href="admin.css">

</head><body><main class="admin-container">

    <h1>Muskan Admin</h1>

    <!-- TRACKER CONTROLS -->

    <section class="admin-card">

        <h2>Tracker Controls</h2>

        <input
            id="status"
            placeholder="Current Status">

        <textarea
            id="message"
            placeholder="Current Message"></textarea>

        <input
            id="battery"
            type="number"
            placeholder="Battery %">

        <input
            id="distance"
            placeholder="Distance">

        <input
            id="lastseen"
            placeholder="Last Seen">

        <input
            id="nextfree"
            placeholder="Next Free Time">

    </section>


    <!-- TODAY'S MISSION -->

    <section class="admin-card">

        <h2>Today's Mission</h2>

        <input
            id="mission1"
            placeholder="Mission 1">

        <input
            id="mission2"
            placeholder="Mission 2">

        <input
            id="mission3"
            placeholder="Mission 3">

    </section>


    <!-- THOUGHT OF THE DAY -->

    <section class="admin-card">

        <h2>Thought Of The Day</h2>

        <textarea
            id="thought"
            placeholder="Write today's thought"></textarea>

    </section>


    <!-- QUIET MODE MONITOR -->

    <section class="admin-card">

        <h2>Quiet Mode</h2>

        <div id="quiet-alert">
            No Active Alert
        </div>

        <div id="quiet-time">
            --
        </div>

    </section>


    <!-- SHIELD MONITOR -->

    <section class="admin-card">

        <h2>Shield Alerts</h2>

        <div id="shield-alert">
            No Emergency Alert
        </div>

        <div id="shield-time">
            --
        </div>

    </section>


    <!-- SAVE -->

    <section class="admin-card">

        <button id="save-btn">
            Save Changes
        </button>

    </section>

</main>

<script type="module" src="admin.js"></script>

</body></html>
