<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D1117">

<title>Quiet Mode</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body><main class="quiet-container">

    <!-- Header -->

    <section class="quiet-hero">

        <h1>
            QUIET<br>
            MODE
        </h1>

        <p>
            Baccha,
            <br><br>
            You don't have to explain everything.
            <br><br>
            Just tell me what happened.
        </p>

    </section>

    <!-- Buttons -->

    <section id="quiet-actions" class="quiet-actions">

        <button id="migraine-btn" class="quiet-button">

            <span class="quiet-icon">
                🤕
            </span>

            <span class="quiet-text">
                Migraine Started
            </span>

        </button>

        <button id="period-btn" class="quiet-button">

            <span class="quiet-icon">
                🌸
            </span>

            <span class="quiet-text">
                Period Day
            </span>

        </button>

    </section>

    <!-- Muskan AI -->

    <section id="muskan-ai-box" class="muskan-ai-box">

        <span class="ai-label">
            MUSKAN AI
        </span>

        <div id="ai-response">

            <p>
                Hey baccha ❤️
                <br><br>
                Some days are heavier than others.
                <br><br>
                You don't need the perfect words.
                <br><br>
                Just tap once.
                <br><br>
                I'll understand.
            </p>

        </div>

    </section>

    <!-- Future Status Card -->

    <section class="quiet-status">

        <span class="quiet-status-label">
            STATUS
        </span>

        <p>
            Quiet Mode is available whenever you need it.
        </p>

    </section>

    <!-- Footer -->

    <section class="quiet-footer">

        <p>
            Built around you.
        </p>

    </section>

</main>

<script type="module" src="quiet-mode-firebase.js"></script>
<script src="app.js"></script>

</body>
        </html>
