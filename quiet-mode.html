<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0D1117">

    <title>Quiet Mode</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <main class="quiet-container">

        <!-- Header -->

        <section class="quiet-hero">

            <h1>
                QUIET<br>
                MODE
            </h1>

            <p>
                Take your time.<br>
                I've already been informed.
            </p>

        </section>

        <!-- Buttons -->

        <section class="quiet-actions">

            <button id="migraine-btn" class="quiet-button">

                <span class="quiet-icon">🤕</span>

                <span class="quiet-text">
                    Migraine Started
                </span>

            </button>

            <button id="period-btn" class="quiet-button">

                <span class="quiet-icon">🌸</span>

                <span class="quiet-text">
                    Period Day
                </span>

            </button>

        </section>

        <!-- Muskan AI Response -->

        <section id="muskan-ai-box" class="muskan-ai-box">

            <span class="ai-label">
                MUSKAN AI
            </span>

            <div id="ai-response">

                <p>
                    Your support message will appear here.
                </p>

            </div>

        </section>

        <!-- Footer Note -->

        <section class="quiet-footer">

            <p>
                Built to support, not disturb.
            </p>

        </section>

    </main>

<script type="module" src="quiet-mode-firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
