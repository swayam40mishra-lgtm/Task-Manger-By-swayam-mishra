<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0D1117">

    <title>Muskan Shield</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <main class="shield-container">

        <!-- Header -->

        <section class="shield-hero">

            <h1>
                MUSKAN<br>
                SHIELD
            </h1>

            <p>
                Emergency support when you need it.
            </p>

        </section>

        <!-- Shield Button -->

        <section class="shield-action">

            <button id="shield-btn" class="shield-button">

                <span class="shield-icon">
                    🛡️
                </span>

                <span class="shield-text">
                    ALERT<br>
                    SWAYAM
                </span>

            </button>

        </section>

        <!-- Info -->

        <section class="shield-info">

            <p>
                Tap if you need immediate attention.
            </p>

            <p>
                Location and device status will be shared.
            </p>

        </section>

        <!-- Muskan AI Response -->

        <section id="shield-ai-box" class="shield-ai-box">

            <span class="shield-ai-label">
                MUSKAN AI
            </span>

            <div id="shield-response">

                <p>
                    Emergency guidance will appear here.
                </p>

            </div>

        </section>

        <!-- Footer -->

        <section class="shield-footer">

            <p>
                For urgent situations only.
            </p>

        </section>

    </main>

    <script src="app.js"></script>

</body>
</html>
